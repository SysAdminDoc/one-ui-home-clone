name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant gradlew permissions
        run: chmod +x ./gradlew

      # Restore release keystore if secret is set; otherwise we still build debug APK.
      # IMPORTANT: rootProject.file("keystore.properties") in app/build.gradle.kts
      # resolves to prototype-android/keystore.properties (that's where settings.gradle.kts
      # lives). The keystore binary goes next to it, so storeFile is a simple filename
      # with no parent directory segments.
      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          cat <<EOF > keystore.properties
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Build release AAB
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        working-directory: ${{ github.workspace }}
        run: |
          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release create "v$VERSION" \
              --title "One UI Home Clone v$VERSION" \
              --notes "See [CHANGELOG.md](CHANGELOG.md) for release notes."
          fi

      - name: Upload debug APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        working-directory: ${{ github.workspace }}
        run: |
          APK=$(find prototype-android/app/build/outputs/apk/debug -name "*.apk" | head -n1)
          if [ -n "$APK" ]; then
            cp "$APK" "one-ui-home-clone-v$VERSION-debug.apk"
            gh release upload "v$VERSION" "one-ui-home-clone-v$VERSION-debug.apk" --clobber
          fi

      - name: Upload release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        working-directory: ${{ github.workspace }}
        run: |
          APK=$(find prototype-android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -n "$APK" ]; then
            cp "$APK" "one-ui-home-clone-v$VERSION.apk"
            gh release upload "v$VERSION" "one-ui-home-clone-v$VERSION.apk" --clobber
          fi

      - name: Upload release AAB
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        working-directory: ${{ github.workspace }}
        run: |
          AAB=$(find prototype-android/app/build/outputs/bundle/release -name "*.aab" | head -n1)
          if [ -n "$AAB" ]; then
            cp "$AAB" "one-ui-home-clone-v$VERSION.aab"
            gh release upload "v$VERSION" "one-ui-home-clone-v$VERSION.aab" --clobber
          fi
